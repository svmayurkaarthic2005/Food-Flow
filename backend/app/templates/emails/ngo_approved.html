<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #10B981; color: white; padding: 20px; text-align: center; border-radius: 8px 8px 0 0; }
        .content { background: #f9fafb; padding: 20px; border: 1px solid #e5e7eb; border-radius: 0 0 8px 8px; }
        .button { display: inline-block; background: #10B981; color: white; padding: 12px 24px; text-decoration: none; border-radius: 6px; margin: 20px 0; }
        .footer { margin-top: 20px; padding-top: 20px; border-top: 1px solid #e5e7eb; font-size: 12px; color: #6b7280; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>✅ Your NGO is Approved!</h2>
        </div>
        <div class="content">
            <p>Hi {{name}},</p>
            <p>Great news! Your NGO registration has been approved by our admin team.</p>
            <p>You can now start claiming food listings and helping your community.</p>
            <a href="{{link}}" class="button">Go to Dashboard</a>
            <div class="footer">
                <p>Welcome to FoodFlow!</p>
                <p>FoodFlow Team</p>
            </div>
        </div>
    </div>
</body>
</html>
