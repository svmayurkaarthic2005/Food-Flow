<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #EF4444; color: white; padding: 20px; text-align: center; border-radius: 8px 8px 0 0; }
        .content { background: #f9fafb; padding: 20px; border: 1px solid #e5e7eb; border-radius: 0 0 8px 8px; }
        .footer { margin-top: 20px; padding-top: 20px; border-top: 1px solid #e5e7eb; font-size: 12px; color: #6b7280; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>NGO Registration Status</h2>
        </div>
        <div class="content">
            <p>Hi {{name}},</p>
            <p>Thank you for your interest in joining FoodFlow. Unfortunately, your NGO registration was not approved at this time.</p>
            <p><strong>Reason:</strong> {{reason}}</p>
            <p>You can contact our support team for more information or reapply in the future.</p>
            <div class="footer">
                <p>FoodFlow Team</p>
            </div>
        </div>
    </div>
</body>
</html>
